      let saved = {};
      try {
        saved = JSON.parse(localStorage.getItem(storageKey) || &quot;{}&quot;);

        saved = {};
      }

      const update = () =&gt; {
        const state = {};
        let complete = 0;
        tasks.forEach((task) =&gt; {
          state[task.dataset.devTask] = task.checked;
          if (task.checked) complete += 1;
        });
        label.textContent = `${complete} of ${tasks.length} tasks`;
        fill.style.width = `${(complete / tasks.length) * 100}%`;
        try {
          localStorage.setItem(storageKey, JSON.stringify(state));
        } catch {
          // Persistence is unavailable in sandboxed previews.
        }

      tasks.forEach((task) =&gt; {
        task.checked = Object.prototype.hasOwnProperty.call(saved, task.dataset.devTask)
          ? Boolean(saved[task.dataset.devTask])
          : task.defaultChecked;
        task.addEventListener(&quot;change&quot;, update);
      });
